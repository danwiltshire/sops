name: Publish

on:
    release:
        types: [published]
    workflow_dispatch:

jobs:
    build:
        name: Build distribution
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: astral-sh/setup-uv@v7
              with:
                  python-version: "3.14"

            - name: Build package
              run: uv build

            - name: Upload dist
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/

    pypi-publish:
        name: Publish to PyPI
        runs-on: ubuntu-latest
        needs: build
        environment: pypi
        permissions:
            id-token: write
        steps:
            - name: Download dist
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/

            - name: Publish package distributions to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
